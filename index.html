<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Low-fi Top-down Racer</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <canvas id="game-canvas" width="960" height="540"></canvas>

    <div id="hud" class="hud hidden">
      <div class="hud-top">
        <div class="hud-block">
          <span class="hud-label">SPD</span>
          <span id="hud-speed" class="hud-value">0</span>
          <span class="hud-unit">km/h</span>
        </div>
        <div class="hud-block">
          <span class="hud-label">LAP</span>
          <span id="hud-lap" class="hud-value">1 / 3</span>
        </div>
        <div class="hud-block">
          <span class="hud-label">POS</span>
          <span id="hud-pos" class="hud-value">1 / 4</span>
        </div>
      </div>
      <div class="hud-radar">
        <canvas id="minimap" width="120" height="120"></canvas>
        <div class="hud-radar-caption">Overview</div>
      </div>
      <div class="hud-hint">Arrows / WASD — steer · Z / Space — accel · X — brake</div>
    </div>

    <div id="menu-main" class="screen">
      <h1>Low-fi Top-down Racer</h1>
      <p class="tagline">Prototype — mechanics first</p>
      <button type="button" id="btn-start">Race</button>
      <button type="button" id="btn-how">Controls</button>
    </div>

    <div id="menu-setup" class="screen hidden">
      <h2>Setup</h2>
      <label>Vehicle
        <select id="select-vehicle"></select>
      </label>
      <label>Track
        <select id="select-track"></select>
      </label>
      <label>Difficulty
        <select id="select-difficulty">
          <option value="easy">Easy</option>
          <option value="normal" selected>Normal</option>
          <option value="hard">Hard</option>
        </select>
      </label>
      <label>Laps
        <input type="number" id="input-laps" min="1" max="9" value="3" />
      </label>
      <div class="setup-actions">
        <button type="button" id="btn-back-main">Back</button>
        <button type="button" id="btn-go-race" class="primary">Start race</button>
      </div>
    </div>

    <div id="menu-how" class="screen hidden">
      <h2>Controls</h2>
      <ul class="how-list">
        <li><kbd>↑</kbd> <kbd>↓</kbd> or <kbd>W</kbd> <kbd>S</kbd> — accelerate / brake</li>
        <li><kbd>←</kbd> <kbd>→</kbd> or <kbd>A</kbd> <kbd>D</kbd> — steer</li>
        <li><kbd>Esc</kbd> — quit to menu (after race)</li>
      </ul>
      <button type="button" id="btn-how-back">Back</button>
    </div>

    <div id="menu-results" class="screen hidden">
      <h2 id="results-title">Race finished</h2>
      <ol id="results-list"></ol>
      <button type="button" id="btn-results-menu">Menu</button>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
